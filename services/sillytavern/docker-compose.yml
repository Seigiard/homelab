services:
  sillytavern:
    image: ghcr.io/sillytavern/sillytavern:latest
    container_name: sillytavern
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Europe/Bratislava}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - SILLYTAVERN_LISTEN=true
      - SILLYTAVERN_WHITELISTMODE=false
      - SILLYTAVERN_SECURITYOVERRIDE=true
      - SILLYTAVERN_HEARTBEATINTERVAL=30
    volumes:
      - ${APPDATA_PATH:-/opt/homelab/appdata}/sillytavern/config:/home/node/app/config
      - ${APPDATA_PATH:-/opt/homelab/appdata}/sillytavern/data:/home/node/app/data
      - ${APPDATA_PATH:-/opt/homelab/appdata}/sillytavern/plugins:/home/node/app/plugins
      - ${APPDATA_PATH:-/opt/homelab/appdata}/sillytavern/extensions:/home/node/app/public/scripts/extensions/third-party
    networks:
      - traefik-net
    healthcheck:
      test: ["CMD", "node", "src/healthcheck.js"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-net
      # Local
      - traefik.http.routers.sillytavern.rule=Host(`chat.${LOCAL_DOMAIN:-home.local}`)
      - traefik.http.routers.sillytavern.entrypoints=web
      - traefik.http.services.sillytavern.loadbalancer.server.port=8000
      # External
      - traefik.http.routers.sillytavern-secure.rule=Host(`chat.${EXTERNAL_DOMAIN:-1218217.xyz}`)
      - traefik.http.routers.sillytavern-secure.entrypoints=websecure
      - traefik.http.routers.sillytavern-secure.tls=true
      - traefik.http.routers.sillytavern-secure.tls.certresolver=cloudflare
      - traefik.http.routers.sillytavern-secure.middlewares=authelia@docker
      - traefik.http.routers.sillytavern-secure.service=sillytavern
      # Homepage
      - homepage.group=AI
      - homepage.name=SillyTavern
      - homepage.icon=sillytavern
      - homepage.href=https://chat.${EXTERNAL_DOMAIN:-1218217.xyz}
      - homepage.description=AI chat frontend

networks:
  traefik-net:
    external: true
