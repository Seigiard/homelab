# Git-versioned Lovelace dashboard (YAML mode).
#
# Mounted read-only at /config/dashboards. Enable once in configuration.yaml:
#   lovelace:
#     mode: storage
#     dashboards:
#       home-yaml:
#         mode: yaml
#         title: Дом
#         icon: mdi:home
#         show_in_sidebar: true
#         filename: dashboards/home.yaml
#
# YAML dashboards have no visual editor. To author a card visually: build it on the
# default (storage) dashboard, open "Edit → Show code editor", copy the YAML here.
# Changes are picked up by a browser refresh (F5) — no HA restart needed.
#
# Entity ids verified against this install — see config/packages/philips_ac3737.yaml.

title: Дом
views:
  - title: Дім
    path: bedroom
    icon: mdi:home
    cards:
      # Очисник (Bubble Card, Clooos/Bubble-Card v3.2.x via HACS).
      # Заголовок-разделитель несёт pill темп. Влажность → в карточку зволоження,
      # PM2.5 → в карточку очищення (вместо "On").
      # Блоки: управление (очиститель, увлажнение); фильтры — появляются
      # ТОЛЬКО когда фильтр пора менять (< 10% ресурса).
      # Note: Bubble Card's slider не поддерживает домен humidifier, поэтому
      # влажность — пресеты 40/50/60%; hold карточки → more-info.
      # Лампы зала и робот-пылесос добавятся отдельными секциями ниже.
      - type: custom:bubble-card
        card_type: separator
        name: Очисник
        icon: mdi:air-purifier
        sub_button:
          - entity: sensor.bedroom_air_cleaner_and_purifier_temperature
            icon: mdi:thermometer
            show_state: true
            show_name: false
        # Pill без фона — только иконка + значение (плоский вид).
        styles: |
          .bubble-sub-button-1 {
            background: transparent !important;
            box-shadow: none !important;
          }

      # --- Управление ---
      - type: custom:bubble-card
        card_type: button
        button_type: state
        entity: fan.bedroom_air_cleaner_and_purifier
        name: Очищення
        icon: mdi:air-purifier
        show_state: false
        show_attribute: true
        button_action:
          tap_action:
            action: more-info
            entity: sensor.bedroom_air_cleaner_and_purifier_pm2_5
        sub_button:
          - name: Авто
            icon: mdi:fan-auto
            tap_action:
              action: call-service
              service: fan.set_preset_mode
              target:
                entity_id: fan.bedroom_air_cleaner_and_purifier
              data:
                preset_mode: auto
          - name: Сон
            icon: mdi:power-sleep
            tap_action:
              action: call-service
              service: fan.set_preset_mode
              target:
                entity_id: fan.bedroom_air_cleaner_and_purifier
              data:
                preset_mode: sleep
          - name: Турбо
            icon: mdi:fan-speed-3
            tap_action:
              action: call-service
              service: fan.set_preset_mode
              target:
                entity_id: fan.bedroom_air_cleaner_and_purifier
              data:
                preset_mode: turbo
        # styles: is a JS template literal (not Jinja).
        # The AC3737 only reports a readable preset_mode when NOT humidifying;
        # while humidifying (binary_sensor…_humidification = on) every mode reads
        # null, so we can't tell them apart — leave buttons neutral (don't dim,
        # don't highlight) instead of guessing. Turbo is never highlighted: it
        # reads null even when dry, indistinguishable from a manual speed.
        styles: |
          ${(() => { const f = hass.states['fan.bedroom_air_cleaner_and_purifier']; const pm = hass.states['sensor.bedroom_air_cleaner_and_purifier_pm2_5']; const s = card.querySelector('.bubble-state'); if (s) s.innerText = (f.state === 'on' && pm) ? `${pm.state} ${pm.attributes.unit_of_measurement || 'µg/m³'}` : ''; return ''; })()}
          ${hass.states['binary_sensor.bedroom_air_cleaner_and_purifier_humidification']?.state === 'off' ? `.bubble-sub-button-1, .bubble-sub-button-2, .bubble-sub-button-3 { opacity: 0.4; }` : ''}
          ${hass.states['fan.bedroom_air_cleaner_and_purifier']?.attributes?.preset_mode === 'auto' ? `.bubble-sub-button-1 { opacity: 1; background: var(--accent-color) !important; }` : ''}
          ${hass.states['fan.bedroom_air_cleaner_and_purifier']?.attributes?.preset_mode === 'sleep' ? `.bubble-sub-button-2 { opacity: 1; background: var(--accent-color) !important; }` : ''}

      # --- Зволоження (увлажнение + влажность объединены в одну карточку) ---
      # Модуль снят (template binary_sensor: humidifier on + humidification off) →
      # одна плитка-предупреждение.
      - type: conditional
        conditions:
          - condition: state
            entity: binary_sensor.ac3737_humidifier_module_removed
            state: "on"
        card:
          type: custom:bubble-card
          card_type: button
          button_type: state
          entity: binary_sensor.ac3737_humidifier_module_removed
          name: Зволожувач знято
          icon: mdi:air-humidifier-off
          show_state: false
          show_attribute: true
          button_action:
            tap_action:
              action: more-info
              entity: sensor.bedroom_air_cleaner_and_purifier_humidity
          styles: |
            ${(() => { const c = hass.states['sensor.bedroom_air_cleaner_and_purifier_humidity'].state; const s = card.querySelector('.bubble-state'); if (s) s.innerText = `${c}%`; return ''; })()}

      # Вторая строка карточки — «текущая % → целевая %» — собирается в styles:
      # Bubble Card не поддерживает шаблоны в name/state, только правку .bubble-state
      # из styles. show_state:false + show_attribute:true оставляют пустой
      # .bubble-state, который мы заполняем. tap → more-info (на AC3737
      # humidifier.turn_off гасит весь прибор, поэтому не toggle).
      #
      # Модуль на месте + есть вода → пресеты целевой влажности.
      - type: conditional
        conditions:
          - condition: state
            entity: binary_sensor.ac3737_humidifier_module_removed
            state: "off"
          - condition: state
            entity: binary_sensor.bedroom_air_cleaner_and_purifier_water_tank
            state: "on"
        card:
          type: custom:bubble-card
          card_type: button
          button_type: state
          entity: humidifier.bedroom_air_cleaner_and_purifier
          name: Зволоження
          icon: mdi:air-humidifier
          show_state: false
          show_attribute: true
          button_action:
            tap_action:
              action: more-info
              entity: sensor.bedroom_air_cleaner_and_purifier_humidity
          sub_button:
            - name: 40%
              icon: mdi:water-outline
              tap_action:
                action: call-service
                service: humidifier.set_humidity
                target:
                  entity_id: humidifier.bedroom_air_cleaner_and_purifier
                data:
                  humidity: 40
            - name: 50%
              icon: mdi:water
              tap_action:
                action: call-service
                service: humidifier.set_humidity
                target:
                  entity_id: humidifier.bedroom_air_cleaner_and_purifier
                data:
                  humidity: 50
            - name: 60%
              icon: mdi:water-plus
              tap_action:
                action: call-service
                service: humidifier.set_humidity
                target:
                  entity_id: humidifier.bedroom_air_cleaner_and_purifier
                data:
                  humidity: 60
          styles: |
            ${(() => { const t = hass.states['humidifier.bedroom_air_cleaner_and_purifier'].attributes.humidity; const c = hass.states['sensor.bedroom_air_cleaner_and_purifier_humidity'].state; const n = card.querySelector('.bubble-name'); const s = card.querySelector('.bubble-state'); if (n) n.innerText = `Зволоження, ${t}%`; if (s) s.innerText = `${c}%`; return ''; })()}
            .bubble-sub-button-1, .bubble-sub-button-2, .bubble-sub-button-3 { opacity: 0.4; }
            ${hass.states['humidifier.bedroom_air_cleaner_and_purifier']?.attributes?.humidity === 40 ? `.bubble-sub-button-1 { opacity: 1; background: var(--accent-color) !important; }` : ''}
            ${hass.states['humidifier.bedroom_air_cleaner_and_purifier']?.attributes?.humidity === 50 ? `.bubble-sub-button-2 { opacity: 1; background: var(--accent-color) !important; }` : ''}
            ${hass.states['humidifier.bedroom_air_cleaner_and_purifier']?.attributes?.humidity === 60 ? `.bubble-sub-button-3 { opacity: 1; background: var(--accent-color) !important; }` : ''}

      # Модуль на месте, но воды нет → та же карточка, справа бэйдж «Немає води».
      - type: conditional
        conditions:
          - condition: state
            entity: binary_sensor.ac3737_humidifier_module_removed
            state: "off"
          - condition: state
            entity: binary_sensor.bedroom_air_cleaner_and_purifier_water_tank
            state: "off"
        card:
          type: custom:bubble-card
          card_type: button
          button_type: state
          entity: humidifier.bedroom_air_cleaner_and_purifier
          name: Зволоження
          icon: mdi:air-humidifier
          show_state: false
          show_attribute: true
          button_action:
            tap_action:
              action: more-info
              entity: sensor.bedroom_air_cleaner_and_purifier_humidity
          sub_button:
            - name: Немає води
              icon: mdi:cup-off-outline
          styles: |
            ${(() => { const t = hass.states['humidifier.bedroom_air_cleaner_and_purifier'].attributes.humidity; const c = hass.states['sensor.bedroom_air_cleaner_and_purifier_humidity'].state; const n = card.querySelector('.bubble-name'); const s = card.querySelector('.bubble-state'); if (n) n.innerText = `Зволоження, ${t}%`; if (s) s.innerText = `${c}%`; return ''; })()}
            .bubble-sub-button-1 { background: var(--error-color) !important; }

      # --- Фильтры: блок появляется только когда нужна замена (< 10%) ---
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.bedroom_air_cleaner_and_purifier_nanoprotect_filter
            below: 10
        card:
          type: custom:bubble-card
          card_type: button
          button_type: state
          entity: sensor.bedroom_air_cleaner_and_purifier_nanoprotect_filter
          name: Замінити HEPA-фільтр
          icon: mdi:air-filter
          show_state: true

      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.bedroom_air_cleaner_and_purifier_pre_filter
            below: 10
        card:
          type: custom:bubble-card
          card_type: button
          button_type: state
          entity: sensor.bedroom_air_cleaner_and_purifier_pre_filter
          name: Промити префільтр
          icon: mdi:filter
          show_state: true

      # ─── Світло (Yeelight GU10 ×2) ───
      # Група light.lampi_zala (helper Light group) керує обома лампами одразу:
      # слайдер = спільна яскравість. Лампи лише brightness (без кольору).
      - type: custom:bubble-card
        card_type: separator
        name: Світло
        icon: mdi:lightbulb-group

      - type: custom:bubble-card
        card_type: button
        button_type: slider
        entity: light.lampi_zala
        name: Лампи зала
        icon: mdi:lightbulb-group

      # ─── Робот-пилосос (Roborock S5 Max) ───
      # Хедер-сепаратор + стан пилососа (Docked / Cleaning / Paused) sub-кнопкою
      # справа (сепаратор не має власного entity — стан показуємо через sub_button).
      - type: custom:bubble-card
        card_type: separator
        name: Пилосос
        icon: mdi:robot-vacuum
        sub_button:
          - entity: vacuum.roborock_s5e_ea3a_robot_cleaner
            show_state: true
            show_name: false
            show_icon: false
            show_background: false

      # Головна картка: play (зліва) = пуск (script — вибрані кімнати АБО все),
      # тап по тілу = pop-up. Sub-кнопки справа: команди стоп / пауза / «де я» /
      # на базу (пласкі), потім шестірня (pop-up) з дефолтним фоном + відступом.
      - type: custom:bubble-card
        card_type: button
        button_type: state
        entity: vacuum.roborock_s5e_ea3a_robot_cleaner
        icon: mdi:play
        show_name: false
        show_state: false
        tap_action:
          action: call-service
          service: script.roborock_clean_selected_rooms
          target: {}
        button_action:
          tap_action:
            action: navigate
            navigation_path: '#roborock-rooms'
        sub_button:
          - icon: mdi:stop
            show_background: false
            tap_action:
              action: call-service
              service: vacuum.stop
              target:
                entity_id: vacuum.roborock_s5e_ea3a_robot_cleaner
          - icon: mdi:pause
            show_background: false
            tap_action:
              action: call-service
              service: vacuum.pause
              target:
                entity_id: vacuum.roborock_s5e_ea3a_robot_cleaner
          - icon: mdi:map-marker
            show_background: false
            tap_action:
              action: call-service
              service: vacuum.locate
              target:
                entity_id: vacuum.roborock_s5e_ea3a_robot_cleaner
          - icon: mdi:home-import-outline
            show_background: false
            tap_action:
              action: call-service
              service: vacuum.return_to_base
              target:
                entity_id: vacuum.roborock_s5e_ea3a_robot_cleaner
          - icon: mdi:cog
            tap_action:
              action: navigate
              navigation_path: '#roborock-rooms'
        styles: |
          .bubble-sub-button-5 {
            margin-left: 12px;
            background: var(--bubble-accent-color, var(--bubble-default-color)) !important;
            opacity: 0.4;
          }

      # Pop-up налаштувань: 1) запуск, 2) потужність, 3) вибір кімнат.
      # show_header: false — без заголовка й хрестика; закривається свайпом вниз,
      # тапом поза попапом або Escape.
      - type: custom:bubble-card
        card_type: pop-up
        hash: '#roborock-rooms'
        show_header: false
        cards:
          - type: custom:bubble-card
            card_type: button
            button_type: name
            name: Запустити
            icon: mdi:play
            tap_action: &vacuum_start
              action: call-service
              service: script.roborock_clean_selected_rooms
              target: {}
            button_action:
              tap_action: *vacuum_start
          - type: custom:bubble-card
            card_type: select
            entity: select.roborock_s5e_ea3a_mode
            name: Потужність
            icon: mdi:fan
            show_state: true
          - type: custom:bubble-card
            card_type: separator
            name: Кімнати
            icon: mdi:floor-plan
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:bubble-card
                card_type: button
                button_type: switch
                entity: input_boolean.roborock_room_zala
                name: Зала
                icon: mdi:sofa
              - type: custom:bubble-card
                card_type: button
                button_type: switch
                entity: input_boolean.roborock_room_spalnya
                name: Спальня
                icon: mdi:bed
              - type: custom:bubble-card
                card_type: button
                button_type: switch
                entity: input_boolean.roborock_room_kuhnya
                name: Кухня
                icon: mdi:stove
              - type: custom:bubble-card
                card_type: button
                button_type: switch
                entity: input_boolean.roborock_room_prihozha
                name: Прихожа
                icon: mdi:coat-rack
              - type: custom:bubble-card
                card_type: button
                button_type: switch
                entity: input_boolean.roborock_room_kabinet
                name: Кабінет
                icon: mdi:desk

  # ─────────────────────────────────────────────────────────────────────
  # Сервер — здоровье железа (данные Glances). Entity ids проверены
  # 2026-06-30. Board-температур it8613 в HA нет (коллизия лейблов temp/fan
  # в Glances) — тепло по CPU/NVMe/GPU. Fan 3 (it8613 2) не подключён.
  # Алерты — config/packages/hardware_health.yaml.
  # ─────────────────────────────────────────────────────────────────────
  - title: Сервер
    path: server
    icon: mdi:server
    cards:
      - type: glance
        title: Сейчас
        columns: 3
        entities:
          - entity: sensor.127_0_0_1_tctl_temperature
            name: CPU
          - entity: sensor.127_0_0_1_nvme_ssd_temperature
            name: NVMe
          - entity: sensor.127_0_0_1_edge_temperature
            name: GPU
          - entity: sensor.127_0_0_1_it8613_0_fan_speed
            name: Fan 1
          - entity: sensor.127_0_0_1_it8613_1_fan_speed
            name: Fan 2

      - type: history-graph
        title: Температуры (24 ч)
        hours_to_show: 24
        entities:
          - entity: sensor.127_0_0_1_tctl_temperature
            name: CPU
          - entity: sensor.127_0_0_1_nvme_ssd_temperature
            name: NVMe
          - entity: sensor.127_0_0_1_edge_temperature
            name: GPU

      - type: history-graph
        title: Обороты вентиляторов (24 ч)
        hours_to_show: 24
        entities:
          - entity: sensor.127_0_0_1_it8613_0_fan_speed
            name: Fan 1
          - entity: sensor.127_0_0_1_it8613_1_fan_speed
            name: Fan 2
