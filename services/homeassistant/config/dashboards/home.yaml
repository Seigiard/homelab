# Git-versioned Lovelace dashboard (YAML mode).
#
# Mounted read-only at /config/dashboards. Enable once in configuration.yaml:
#   lovelace:
#     mode: storage
#     dashboards:
#       home-yaml:
#         mode: yaml
#         title: Дом
#         icon: mdi:home
#         show_in_sidebar: true
#         filename: dashboards/home.yaml
#
# YAML dashboards have no visual editor. To author a card visually: build it on the
# default (storage) dashboard, open "Edit → Show code editor", copy the YAML here.
# Changes are picked up by a browser refresh (F5) — no HA restart needed.
#
# Entity ids verified against this install — see config/packages/philips_ac3737.yaml.

title: Дом
views:
  - title: Спальня
    path: bedroom
    icon: mdi:bed
    cards:
      - type: tile
        entity: fan.bedroom_air_cleaner_and_purifier
        name: Очиститель
        features:
          - type: fan-preset-modes
            style: icons
            preset_modes:
              - auto
              - sleep
              - turbo

      - type: humidifier
        entity: humidifier.bedroom_air_cleaner_and_purifier
        name: Увлажнение

      - type: glance
        title: Воздух
        entities:
          - entity: sensor.bedroom_air_cleaner_and_purifier_pm2_5
            name: PM2.5
          - entity: sensor.bedroom_air_cleaner_and_purifier_humidity
            name: Влажность
          - entity: sensor.bedroom_air_cleaner_and_purifier_temperature
            name: Темп.
          - entity: binary_sensor.bedroom_air_cleaner_and_purifier_water_tank
            name: Бак

      - type: glance
        title: Фильтры
        entities:
          - entity: sensor.bedroom_air_cleaner_and_purifier_nanoprotect_filter
            name: HEPA
          - entity: sensor.bedroom_air_cleaner_and_purifier_pre_filter
            name: Предфильтр

      # ─────────────────────────────────────────────────────────────────────
      # Bubble Card variant (Clooos/Bubble-Card v3.2.x, via HACS) — same
      # entities, kept below the stock cards for side-by-side comparison.
      # Layout: control blocks (purifier, humidifier), then stat blocks (air,
      # humidity), then filter blocks that appear ONLY when a filter needs
      # service (< 10% life left).
      # Note: Bubble Card's slider does NOT support the humidifier domain, so
      # humidity uses one-tap presets (40/50/60%); hold the card → more-info
      # for fine control.
      # ─────────────────────────────────────────────────────────────────────
      - type: custom:bubble-card
        card_type: separator
        name: Спальня (Bubble Card)
        icon: mdi:air-purifier

      # --- Управление ---
      - type: custom:bubble-card
        card_type: button
        button_type: state
        entity: fan.bedroom_air_cleaner_and_purifier
        name: Очистка
        icon: mdi:air-purifier
        show_state: true
        sub_button:
          - name: Auto
            icon: mdi:fan-auto
            tap_action:
              action: call-service
              service: fan.set_preset_mode
              target:
                entity_id: fan.bedroom_air_cleaner_and_purifier
              data:
                preset_mode: auto
          - name: Sleep
            icon: mdi:power-sleep
            tap_action:
              action: call-service
              service: fan.set_preset_mode
              target:
                entity_id: fan.bedroom_air_cleaner_and_purifier
              data:
                preset_mode: sleep
          - name: Turbo
            icon: mdi:fan-speed-3
            tap_action:
              action: call-service
              service: fan.set_preset_mode
              target:
                entity_id: fan.bedroom_air_cleaner_and_purifier
              data:
                preset_mode: turbo
        # styles: is a JS template literal (not Jinja). Dim all mode buttons,
        # highlight the one matching the current preset_mode.
        styles: |
          .bubble-sub-button-1, .bubble-sub-button-2, .bubble-sub-button-3 { opacity: 0.4; }
          ${hass.states['fan.bedroom_air_cleaner_and_purifier']?.attributes?.preset_mode === 'auto' ? `.bubble-sub-button-1 { opacity: 1; background: var(--accent-color) !important; }` : ''}
          ${hass.states['fan.bedroom_air_cleaner_and_purifier']?.attributes?.preset_mode === 'sleep' ? `.bubble-sub-button-2 { opacity: 1; background: var(--accent-color) !important; }` : ''}
          ${hass.states['fan.bedroom_air_cleaner_and_purifier']?.attributes?.preset_mode === 'turbo' ? `.bubble-sub-button-3 { opacity: 1; background: var(--accent-color) !important; }` : ''}

      - type: custom:bubble-card
        card_type: button
        button_type: switch
        entity: humidifier.bedroom_air_cleaner_and_purifier
        name: Увлажнение
        icon: mdi:air-humidifier
        show_state: true
        show_attribute: true
        attribute: humidity
        button_action:
          hold_action:
            action: more-info
        sub_button:
          - name: 40%
            icon: mdi:water-outline
            tap_action:
              action: call-service
              service: humidifier.set_humidity
              target:
                entity_id: humidifier.bedroom_air_cleaner_and_purifier
              data:
                humidity: 40
          - name: 50%
            icon: mdi:water
            tap_action:
              action: call-service
              service: humidifier.set_humidity
              target:
                entity_id: humidifier.bedroom_air_cleaner_and_purifier
              data:
                humidity: 50
          - name: 60%
            icon: mdi:water-plus
            tap_action:
              action: call-service
              service: humidifier.set_humidity
              target:
                entity_id: humidifier.bedroom_air_cleaner_and_purifier
              data:
                humidity: 60
        # Highlight the preset matching the current target humidity (40/50/60).
        styles: |
          .bubble-sub-button-1, .bubble-sub-button-2, .bubble-sub-button-3 { opacity: 0.4; }
          ${hass.states['humidifier.bedroom_air_cleaner_and_purifier']?.attributes?.humidity === 40 ? `.bubble-sub-button-1 { opacity: 1; background: var(--accent-color) !important; }` : ''}
          ${hass.states['humidifier.bedroom_air_cleaner_and_purifier']?.attributes?.humidity === 50 ? `.bubble-sub-button-2 { opacity: 1; background: var(--accent-color) !important; }` : ''}
          ${hass.states['humidifier.bedroom_air_cleaner_and_purifier']?.attributes?.humidity === 60 ? `.bubble-sub-button-3 { opacity: 1; background: var(--accent-color) !important; }` : ''}

      # --- Статистика ---
      - type: custom:bubble-card
        card_type: button
        button_type: state
        entity: sensor.bedroom_air_cleaner_and_purifier_pm2_5
        name: Воздух
        icon: mdi:blur
        show_state: true
        sub_button:
          - entity: sensor.bedroom_air_cleaner_and_purifier_temperature
            icon: mdi:thermometer
            show_state: true
            show_name: false

      - type: custom:bubble-card
        card_type: button
        button_type: state
        entity: sensor.bedroom_air_cleaner_and_purifier_humidity
        name: Влажность
        icon: mdi:water-percent
        show_state: true
        sub_button:
          - entity: binary_sensor.bedroom_air_cleaner_and_purifier_water_tank
            icon: mdi:cup-water
            show_state: true
            show_name: false

      # --- Фильтры: блок появляется только когда нужна замена (< 10%) ---
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.bedroom_air_cleaner_and_purifier_nanoprotect_filter
            below: 10
        card:
          type: custom:bubble-card
          card_type: button
          button_type: state
          entity: sensor.bedroom_air_cleaner_and_purifier_nanoprotect_filter
          name: Заменить HEPA-фильтр
          icon: mdi:air-filter
          show_state: true

      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.bedroom_air_cleaner_and_purifier_pre_filter
            below: 10
        card:
          type: custom:bubble-card
          card_type: button
          button_type: state
          entity: sensor.bedroom_air_cleaner_and_purifier_pre_filter
          name: Промыть предфильтр
          icon: mdi:filter
          show_state: true

  # Lights and the robot vacuum land here once their integrations are added.
  # Add tiles with the real entity ids (Developer Tools → States):
  #   - type: tile
  #     entity: light.<name>
  #   - type: tile
  #     entity: vacuum.<name>
  #     features:
  #       - type: vacuum-commands
