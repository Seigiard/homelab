# Xiaomi Cloud Map Extractor — live map camera for the Roborock S5 Max
#
# Stored in git so the config can be restored. Loaded as a Home Assistant
# "package" — see services/homeassistant/README.md for the one-time setup.
#
# Integration: xiaomi_cloud_map_extractor (HACS, PiotrMachowski). Pulls the live
# map from the Xiaomi cloud using account credentials (independent of how the
# vacuum is added — the robot itself is via xiaomi_miot). Produces
# camera.xiaomi_cloud_map_extractor, consumed by the xiaomi-vacuum-map-card in
# dashboards/home.yaml. The calibration_points attribute lets the card align
# vacuum coordinates to the map image.
#
# SECRETS live in appdata/homeassistant/secrets.yaml on the server (NOT in git):
#   xiaomi_vacuum_host:     192.168.1.xxx        # vacuum IP
#   xiaomi_vacuum_token:    <32 hex chars>       # miio device token — see guide below
#   xiaomi_cloud_username:  <Xiaomi Home email>
#   xiaomi_cloud_password:  <Xiaomi Home password>
#
# Token extraction: https://github.com/PiotrMachowski/Xiaomi-cloud-tokens-extractor
#
# country: Xiaomi cloud server region — MUST match the account's region.
# One of: cn de us ru tw sg in i2. EU accounts are usually `de`. Set it below;
# leaving it unset makes the integration probe every server (slow).

camera:
  - platform: xiaomi_cloud_map_extractor
    host: !secret xiaomi_vacuum_host
    token: !secret xiaomi_vacuum_token
    username: !secret xiaomi_cloud_username
    password: !secret xiaomi_cloud_password
    country: de
    draw:
      - all
    attributes:
      - calibration_points
