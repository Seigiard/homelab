# Philips AC3737/10 — air purifier + humidifier automations
#
# Stored in git so the config can be restored. Loaded as a Home Assistant
# "package" — see services/homeassistant/README.md for the one-time setup.
#
# Integration: philips_airpurifier_coap (HACS, CoAP). Model AC3737/10, fw 1.0.4.
#
# Entities (verified against this install via Developer Tools → States, device
# "Air Cleaner and Purifier"):
#   fan.bedroom_air_cleaner_and_purifier                       preset_mode: auto | sleep | turbo; also error_code, runtime
#   humidifier.bedroom_air_cleaner_and_purifier                target humidity 40–70 %; supported_features: 0 (только on/off + set_humidity), action: idle | humidifying
#   binary_sensor.bedroom_air_cleaner_and_purifier_humidification  on = модуль увлажнения вставлен и функция задействована; off = модуль СНЯТ (или режим «только очистка»)
#   binary_sensor.bedroom_air_cleaner_and_purifier_water_tank  moisture: on = есть вода, off = пусто — НО при снятом модуле ложно показывает on, поэтому ненадёжен для детекта снятия
#   light.bedroom_air_cleaner_and_purifier_display_backlight   подсветка дисплея
#   switch.bedroom_air_cleaner_and_purifier_child_lock         блокировка от детей
#   sensor.bedroom_air_cleaner_and_purifier_pm2_5              µg/m³
#   sensor.bedroom_air_cleaner_and_purifier_indoor_allergen_index  0–12 (IAI)
#   sensor.bedroom_air_cleaner_and_purifier_humidity           %
#   sensor.bedroom_air_cleaner_and_purifier_temperature        °C
#   sensor.bedroom_air_cleaner_and_purifier_nanoprotect_filter HEPA filter life, % remaining
#   sensor.bedroom_air_cleaner_and_purifier_pre_filter         pre-filter life, % remaining
#   sensor.bedroom_air_cleaner_and_purifier_rssi               WiFi signal, dBm
#   notify.nothingphone                                        push to phone (HA mobile app)
#
# Детект снятого модуля: humidifier = on, НО humidification = off (A/B-проверено —
# при action: idle и без воды humidification = on, пока модуль на месте; уходит в
# off ровно при снятии). water_tank для этого непригоден: при снятом модуле = on.

template:
  - binary_sensor:
      - name: "AC3737 humidifier module removed"
        unique_id: ac3737_humidifier_module_removed
        icon: mdi:air-humidifier-off
        state: >
          {{ is_state('humidifier.bedroom_air_cleaner_and_purifier', 'on')
             and is_state('binary_sensor.bedroom_air_cleaner_and_purifier_humidification', 'off') }}

automation:
  - id: ac3737_night_sleep
    alias: "AC3737 — тихий режим ночью + увлажнение 50%"
    triggers:
      - trigger: time
        at: "22:00:00"
    actions:
      - action: fan.set_preset_mode
        continue_on_error: true
        target:
          entity_id: fan.bedroom_air_cleaner_and_purifier
        data:
          preset_mode: sleep
      - action: humidifier.turn_on
        continue_on_error: true
        target:
          entity_id: humidifier.bedroom_air_cleaner_and_purifier
      - action: humidifier.set_humidity
        continue_on_error: true
        target:
          entity_id: humidifier.bedroom_air_cleaner_and_purifier
        data:
          humidity: 50
    mode: single

  # NB: humidifier.turn_off on the AC3737 powers off the WHOLE appliance, not
  # just humidification (the humidifier entity has supported_features: 0 and no
  # separate function/mode control). So "stop humidifying" in the morning is
  # done by dropping the target to its minimum (40%) instead of turning it off.
  - id: ac3737_morning_auto
    alias: "AC3737 — авто-режим утром + увлажнение на минимум 40%"
    triggers:
      - trigger: time
        at: "08:00:00"
    actions:
      - action: fan.set_preset_mode
        continue_on_error: true
        target:
          entity_id: fan.bedroom_air_cleaner_and_purifier
        data:
          preset_mode: auto
      - action: humidifier.set_humidity
        continue_on_error: true
        target:
          entity_id: humidifier.bedroom_air_cleaner_and_purifier
        data:
          humidity: 40
    mode: single

  # A time trigger does not fire retroactively. If the device is unreachable at
  # 22:00/08:00 (power cut → DHCP IP change → dead CoAP client), the scheduled
  # mode is lost for the rest of the window. Re-apply the schedule's mode on HA
  # start and whenever the fan returns from "unavailable". Retries because the
  # device may reject the first command right after reconnecting.
  - id: ac3737_reconcile_mode
    alias: "AC3737 — восстановить режим при старте/реконнекте"
    triggers:
      - trigger: homeassistant
        event: start
      - trigger: state
        entity_id: fan.bedroom_air_cleaner_and_purifier
        from: "unavailable"
    variables:
      desired_mode: "{{ 'sleep' if now().hour >= 22 or now().hour < 8 else 'auto' }}"
    conditions:
      - condition: template
        value_template: "{{ has_value('fan.bedroom_air_cleaner_and_purifier') }}"
    actions:
      - repeat:
          count: 3
          sequence:
            - action: fan.set_preset_mode
              continue_on_error: true
              target:
                entity_id: fan.bedroom_air_cleaner_and_purifier
              data:
                preset_mode: "{{ desired_mode }}"
            - if:
                - condition: template
                  value_template: "{{ state_attr('fan.bedroom_air_cleaner_and_purifier', 'preset_mode') == desired_mode }}"
              then:
                - stop: "режим установлен"
            - delay: "00:00:05"
    mode: single

  # Sudden pollution (cooking, etc.) overrides any mode → turbo, and notifies.
  - id: ac3737_boost_on_pollution
    alias: "AC3737 — разгон при сильном загрязнении"
    triggers:
      - trigger: numeric_state
        entity_id: sensor.bedroom_air_cleaner_and_purifier_pm2_5
        above: 35
        for: "00:05:00"
    actions:
      - action: fan.set_preset_mode
        target:
          entity_id: fan.bedroom_air_cleaner_and_purifier
        data:
          preset_mode: turbo
      - action: notify.send_message
        target:
          entity_id: notify.nothingphone
        data:
          title: "Воздух загрязнён"
          message: "PM2.5 = {{ states('sensor.bedroom_air_cleaner_and_purifier_pm2_5') }} µg/m³ — включил Turbo"
    mode: single

  # After air is clean again, restore the schedule's mode (sleep at night, else auto).
  - id: ac3737_restore_after_clean
    alias: "AC3737 — вернуть режим после очистки"
    triggers:
      - trigger: numeric_state
        entity_id: sensor.bedroom_air_cleaner_and_purifier_pm2_5
        below: 20
        for: "00:15:00"
    actions:
      - action: fan.set_preset_mode
        target:
          entity_id: fan.bedroom_air_cleaner_and_purifier
        data:
          preset_mode: >-
            {{ 'sleep' if now().hour >= 22 or now().hour < 8 else 'auto' }}
    mode: single

  - id: ac3737_filter_hepa_low
    alias: "AC3737 — пора менять HEPA-фильтр"
    triggers:
      - trigger: numeric_state
        entity_id: sensor.bedroom_air_cleaner_and_purifier_nanoprotect_filter
        below: 10
    actions:
      - action: notify.send_message
        target:
          entity_id: notify.nothingphone
        data:
          title: "AC3737: фильтр"
          message: "Ресурс NanoProtect HEPA-фильтра {{ states('sensor.bedroom_air_cleaner_and_purifier_nanoprotect_filter') }}% — пора заказать новый"
    mode: single

  - id: ac3737_prefilter_low
    alias: "AC3737 — почистить предфильтр"
    triggers:
      - trigger: numeric_state
        entity_id: sensor.bedroom_air_cleaner_and_purifier_pre_filter
        below: 10
    actions:
      - action: notify.send_message
        target:
          entity_id: notify.nothingphone
        data:
          title: "AC3737: предфильтр"
          message: "Ресурс предфильтра {{ states('sensor.bedroom_air_cleaner_and_purifier_pre_filter') }}% — промой его водой"
    mode: single

  - id: ac3737_water_tank_empty
    alias: "AC3737 — пустой бак воды"
    triggers:
      - trigger: state
        entity_id: binary_sensor.bedroom_air_cleaner_and_purifier_water_tank
        to: "off"
        for: "00:01:00"
    actions:
      - action: notify.send_message
        target:
          entity_id: notify.nothingphone
        data:
          title: "AC3737: вода"
          message: "Бак для воды пуст — увлажнение остановлено"
    mode: single
