services:
  podsync:
    image: ghcr.io/mxpv/podsync:latest
    container_name: podsync
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Europe/Bratislava}
      - PODSYNC_YOUTUBE_API_KEY=${PODSYNC_YOUTUBE_API_KEY}
    volumes:
      - ./config.toml:/app/config.toml:ro
      - ${APPDATA_PATH:-/opt/homelab/appdata}/podsync/db:/app/db
      - ${DATA_PATH:-/mnt/data}/public/podcasts:/app/data
    networks:
      - traefik-net
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-net
      # Local
      - traefik.http.routers.podsync.rule=Host(`podsync.${LOCAL_DOMAIN:-home.local}`)
      - traefik.http.routers.podsync.entrypoints=web
      - traefik.http.services.podsync.loadbalancer.server.port=8080
      # External
      - traefik.http.routers.podsync-secure.rule=Host(`podsync.${EXTERNAL_DOMAIN:-1218217.xyz}`)
      - traefik.http.routers.podsync-secure.entrypoints=websecure
      - traefik.http.routers.podsync-secure.tls=true
      - traefik.http.routers.podsync-secure.tls.certresolver=cloudflare
      - traefik.http.routers.podsync-secure.service=podsync
      # Homepage
      - homepage.group=Media
      - homepage.name=Podsync
      - homepage.icon=podsync
      - homepage.href=https://podsync.${EXTERNAL_DOMAIN:-1218217.xyz}
      - homepage.description=YouTube to Podcast RSS

networks:
  traefik-net:
    external: true
